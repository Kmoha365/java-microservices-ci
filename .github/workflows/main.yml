name: Microservices CI
on:
  push:
    branches: ["master"]
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        service: [employee-service, department-service, api-gateway]
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup-java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: 'maven'
      - name: build JAR
        run: |
          cd ${{matrix.service}}
          mvn -B clean verify




        
