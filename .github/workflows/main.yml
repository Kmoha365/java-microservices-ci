name: Microservices CI

on:
  push:
    branches: ["master"]

jobs:

# ================= SECRET SCAN =================
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2


# ================= BUILD + DOCKER + TRIVY =================
  build-and-scan:
    needs: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        service: [employee-service, department-service, api-gateway]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- Java Setup ----------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # ---------- Build JAR ----------
      - name: Build Service
        working-directory: ${{ matrix.service }}
        run: mvn -B clean package

      # ---------- Build Docker Image (LOCAL) ----------
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }} ./${{ matrix.service }}
          docker tag ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }} \
                     ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest

      # ---------- Cache Trivy DB (Speed) ----------
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db

      # ---------- Trivy Scan BEFORE PUSH ----------
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      # ---------- Docker Login ----------
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ---------- Push ONLY if Scan Passed ----------
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest